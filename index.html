<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>For You ❤️</title><style>body{font-family:Arial;background:linear-gradient(135deg,#ffb6d5,#ffe8f2);display:flex;justify-content:center;align-items:center;height:100vh;margin:0}.card{background:#fff;padding:30px;border-radius:20px;text-align:center;max-width:420px;box-shadow:0 8px 25px rgba(0,0,0,.2)}button{padding:12px 24px;margin:10px;border:none;border-radius:10px;font-size:18px;cursor:pointer}#yes{background:#ff4f8b;color:#fff}#no{background:#ddd;position:absolute}</style></head><body><div class="card"><h1>Hey ❤️</h1><p>There's something I've wanted to ask you...</p><h2>Will you be my girlfriend? 💖</h2><button id="yes" onclick="document.getElementById('m').innerHTML='🥹❤️ You just made me the happiest person alive!'">YES ❤️</button><button id="no">NO 🙈</button><p id="m"></p></div><script>const n=document.getElementById('no');n.onmouseover=()=>{n.style.left=Math.random()*(innerWidth-90)+'px';n.style.top=Math.random()*(innerHeight-50)+'px';};</script></body></html>
